version: "3.8"

services:
  ths-monitor:
    image: ghcr.io/hsieh19/microth:latest
    container_name: ths-monitor
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # 持久化挂载 SQLite 数据文件及滚动日志文件夹，防容器销毁丢失
      - ./server/data:/app/data
      - ./server/logs:/app/logs
    environment:
      # 开启 Python 标准输出无缓冲，以确保 docker logs 能实时输出日志
      - PYTHONUNBUFFERED=1
